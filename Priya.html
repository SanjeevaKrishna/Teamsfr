<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      margin: 0;
      padding: 40px 20px;
    }

    a.back {
      display: inline-block;
      margin-bottom: 24px;
      color: #4f46e5;
      text-decoration: none;
      font-size: 14px;
    }
    a.back:hover { text-decoration: underline; }

    .card {
      background: white;
      border-radius: 16px;
      max-width: 580px;
      margin: 0 auto;
      padding: 40px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      border-top: 6px solid var(--color, #4f46e5);
    }

    .top {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 28px;
    }

    .emoji { font-size: 64px; }

    .name {
      font-size: 26px;
      font-weight: bold;
      color: #1a1a2e;
      margin-bottom: 4px;
    }

    .role {
      font-size: 15px;
      font-weight: bold;
      color: var(--color, #4f46e5);
      margin-bottom: 4px;
    }

    .location { font-size: 13px; color: #999; }

    .section-title {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #aaa;
      margin: 24px 0 8px;
    }

    .bio { color: #444; line-height: 1.7; font-size: 15px; }

    .email a {
      color: var(--color, #4f46e5);
      text-decoration: none;
      font-size: 15px;
    }

    .skills {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .skill {
      background: #f0f0f8;
      color: #333;
      border-radius: 100px;
      padding: 5px 14px;
      font-size: 13px;
      font-weight: bold;
    }

    .loading { text-align: center; color: #999; padding: 60px; }
    .error   { text-align: center; color: red; padding: 40px; }
  </style>
</head>
<body>

  <div style="max-width:580px; margin:0 auto">
    <a class="back" href="../index.html">← Back to Team</a>
  </div>

  <div id="profile">
    <div class="loading">Loading profile...</div>
  </div>

  <script>
    /*
      THIS PAGE'S JOB:
      - Read the URL to know which person to show  (window.location.pathname)
      - Fetch team.json
      - Find the matching person by their "id"
      - Fill in the page with their data

      KEY CONCEPT:
      This same HTML file is REUSED for every profile.
      Only the DATA changes (from team.json).
      That is why you only need ONE profile template.
    */

    // Step 1: Figure out who this page is for
    // e.g. if URL is /pages/arjun.html → id is "arjun"
    const filename = window.location.pathname.split('/').pop(); // "arjun.html"
    const myId = filename.replace('.html', '');                 // "arjun"

    // Step 2: Load the team data
    fetch('../team.json')
      .then(response => response.json())
      .then(members => {

        // Step 3: Find this person in the list
        const person = members.find(m => m.id === myId);

        if (!person) {
          document.getElementById('profile').innerHTML =
            '<div class="error">Person not found in team.json</div>';
          return;
        }

        // Step 4: Update the page title
        document.title = person.name + ' – Profile';

        // Step 5: Build the skill tags
        const skillsHTML = person.skills
          .map(s => `<span class="skill">${s}</span>`)
          .join('');

        // Step 6: Inject all the data into the page
        document.getElementById('profile').innerHTML = `
          <div class="card" style="--color: ${person.color}">
            <div class="top">
              <div class="emoji">${person.emoji}</div>
              <div>
                <div class="name">${person.name}</div>
                <div class="role">${person.role}</div>
                <div class="location">📍 ${person.location}</div>
              </div>
            </div>

            <div class="section-title">About</div>
            <div class="bio">${person.bio}</div>

            <div class="section-title">Email</div>
            <div class="email"><a href="mailto:${person.email}">${person.email}</a></div>

            <div class="section-title">Skills</div>
            <div class="skills">${skillsHTML}</div>
          </div>
        `;

      })
      .catch(() => {
        document.getElementById('profile').innerHTML =
          '<div class="error">Could not load team.json</div>';
      });
  </script>

</body>
</html>
